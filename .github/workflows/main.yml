name: Build iOS IPA

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # ၁။ Node.js Backend dependencies များ သတ်မှတ်ခြင်း
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '16'
        cache: 'npm'
        cache-dependency-path: backend/package.json

    - name: Install Backend Dependencies
      run: |
        cd backend
        npm install

    # ၂။ မူရင်း Script ကို သုံးပြီး xcode project ဆောက်ခြင်း
    - name: Generate Xcode Project
      run: |
        chmod +x generate-xcode-project.sh
        ./generate-xcode-project.sh

    # ၃။ Package building အတွက် Destination သတ်မှတ်ပြီး Archive လုပ်ခြင်း
    - name: Build Archive
      run: |
        cd ios
        xcodebuild archive \
          -scheme MyanmarRussianLearner \
          -archivePath build/MyanmarRussianLearner.xcarchive \
          -destination "generic/platform=iOS" \
          -allowProvisioningUpdates

    # ၄။ Archive မှ .ipa ဖိုင်သို့ Export ထုတ်ခြင်း
    - name: Export IPA
      run: |
        cd ios
        xcodebuild -exportArchive \
          -archivePath build/MyanmarRussianLearner.xcarchive \
          -exportPath build/exported \
          -exportOptionsPlist ExportOptions.plist \
          -allowProvisioningUpdates

    # ၅။ ထွက်လာသည့် .ipa ဖိုင်ကို GitHub Artifact အနေဖြင့် သိမ်းဆည်းခြင်း
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: iOS-IPA
        path: ios/build/exported/*.ipa
