name: Build iOS IPA

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # ၁။ Node.js server နဲ့ dependencies များ သတ်မှတ်ခြင်း
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-node-version: '16'
        cache: 'npm'
        cache-dependency-path: backend/package.json

    - name: Install Backend Dependencies
      run: |
        cd backend
        npm install

    # ၂။ Xcode Project ဖိုင်ကို Script သုံးပြီး Generate လုပ်ခြင်း
    - name: Generate Xcode Project
      run: |
        chmod +x generate-xcode-project.sh
        ./generate-xcode-project.sh

    # ၃။ Certificates နှင့် Provisioning Profiles များ ထည့်သွင်းခြင်း (Signing)
    # မှတ်ချက် - တကယ့် .ipa ထုတ်ဖို့ Apple Developer Account က Certificate တွေ လိုအပ်ပါတယ်။
    - name: Install the Apple certificate and provisioning profile
      env:
        BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
        P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      run: |
        # ဤနေရာတွင် Apple Certificate များကို Keychain ထဲ သွင်းသည့် Script ရေးရန်လိုအပ်သည်

    # ၄။ Xcode Build (Archive) လုပ်ခြင်း
    - name: Build Archive
      run: |
        cd ios
        xcodebuild archive \
          -scheme MyanmarRussianLearner \
          -archivePath build/MyanmarRussianLearner.xcarchive \
          -allowProvisioningUpdates

    # ၅။ Archive မှ .ipa ဖိုင်သို့ Export ထုတ်ခြင်း
    - name: Export IPA
      run: |
        cd ios
        xcodebuild -exportArchive \
          -archivePath build/MyanmarRussianLearner.xcarchive \
          -exportPath build/exported \
          -exportOptionsPlist ExportOptions.plist \
          -allowProvisioningUpdates

    # ၆။ ထွက်လာသည့် .ipa ဖိုင်ကို GitHub မှာ Download ဆွဲနိုင်အောင် သိမ်းဆည်းခြင်း
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: iOS-IPA
        path: ios/build/exported/*.ipa
